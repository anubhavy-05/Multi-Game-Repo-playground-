<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse Siege - Tactical Action RPG</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <header class="top-header">
            <h1>Eclipse Siege</h1>
            <p class="subtitle">Tactical Action RPG</p>
        </header>

        <main class="game-layout">
            <section class="canvas-panel" aria-label="Game canvas panel">
                <canvas id="gameCanvas" width="1280" height="720"></canvas>

                <div id="bootOverlay" class="boot-overlay" aria-live="polite">
                    <h2>Commit 1: Canvas Bootstrapped</h2>
                    <p>The rendering surface and UI shell are ready.</p>
                    <p>Next commit will introduce the core game class.</p>
                </div>
            </section>

            <aside class="hud-panel" aria-label="Heads-up display">
                <h2>Status</h2>
                <div class="hud-row">
                    <span>State</span>
                    <strong id="gameState">booting</strong>
                </div>
                <div class="hud-row">
                    <span>Player HP</span>
                    <strong id="playerHealth">0</strong>
                </div>
                <div class="hud-row">
                    <span>Energy</span>
                    <strong id="playerEnergy">0</strong>
                </div>
                <div class="hud-row">
                    <span>Score</span>
                    <strong id="scoreValue">0</strong>
                </div>
                <div class="hud-row">
                    <span>Wave</span>
                    <strong id="waveValue">0</strong>
                </div>
            </aside>
        </main>

        <footer class="footer-note">
            <p>Use WASD or Arrow Keys to move once controls are added in later commits.</p>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
