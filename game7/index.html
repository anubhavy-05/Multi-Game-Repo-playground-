<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle Defenders - Tower Defense RPG</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>🏰 Castle Defenders</h1>
            <p class="subtitle">Tower Defense RPG</p>
        </header>
        
        <div class="game-wrapper">
            <!-- Canvas for game rendering -->
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            
            <!-- Game UI Overlay -->
            <div id="gameUI" class="game-ui">
                <div class="top-bar">
                    <div class="stat-group">
                        <span class="stat-label">💰 Gold:</span>
                        <span id="gold" class="stat-value">100</span>
                    </div>
                    <div class="stat-group">
                        <span class="stat-label">💙 Mana:</span>
                        <span id="mana" class="stat-value">50</span>
                    </div>
                    <div class="stat-group">
                        <span class="stat-label">❤️ Lives:</span>
                        <span id="lives" class="stat-value">25</span>
                    </div>
                    <div class="stat-group">
                        <span class="stat-label">🌊 Wave:</span>
                        <span id="wave" class="stat-value">1</span>
                    </div>
                </div>
                
                <!-- Tower Selection Menu -->
                <div class="tower-menu">
                    <h3>🗼 Towers</h3>
                    <button class="tower-btn" data-tower="archer" title="Fast attack, medium damage">
                        <span class="tower-icon">🏹</span>
                        <span class="tower-name">Archer</span>
                        <span class="tower-cost">💰20</span>
                    </button>
                    <button class="tower-btn" data-tower="mage" title="Slow attack, high AOE damage">
                        <span class="tower-icon">🔮</span>
                        <span class="tower-name">Mage</span>
                        <span class="tower-cost">💰30</span>
                    </button>
                    <button class="tower-btn" data-tower="cannon" title="Splash damage, good range">
                        <span class="tower-icon">💣</span>
                        <span class="tower-name">Cannon</span>
                        <span class="tower-cost">💰40</span>
                    </button>
                    <button class="tower-btn" data-tower="lightning" title="Chain damage to multiple enemies">
                        <span class="tower-icon">⚡</span>
                        <span class="tower-name">Lightning</span>
                        <span class="tower-cost">💰50</span>
                    </button>
                </div>
                
                <!-- Tower Upgrade Panel -->
                <div id="upgrade-panel" class="upgrade-panel" style="display: none;">
                    <h3 id="tower-name">Tower</h3>
                    <div id="tower-level" class="upgrade-level">Level 1</div>
                    <div class="upgrade-stats">
                        <div id="tower-damage" class="upgrade-stat">💥 Damage: 0</div>
                        <div id="tower-range" class="upgrade-stat">🎯 Range: 0</div>
                        <div id="tower-fire-rate" class="upgrade-stat">⚡ Fire Rate: 0</div>
                    </div>
                    <button id="upgrade-btn" class="upgrade-btn">
                        <span>⬆️ Upgrade</span>
                        <span id="upgrade-cost" class="upgrade-cost">💰0</span>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="info">
            <p>🎮 Tower Defense RPG - Defend your castle from waves of enemies!</p>
            <p>Game is being built commit by commit...</p>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
